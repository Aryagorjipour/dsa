<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background -->
  <rect width="500" height="500" rx="80" fill="#0F172A"/>
  
  <!-- Decorative grid / array lines -->
  <g stroke="#334155" stroke-width="4" opacity="0.6">
    <line x1="80" y1="120" x2="420" y2="120"/>
    <line x1="80" y1="180" x2="420" y2="180"/>
    <line x1="80" y1="240" x2="420" y2="240"/>
    <line x1="80" y1="300" x2="420" y2="300"/>
    <line x1="80" y1="360" x2="420" y2="360"/>
    
    <line x1="120" y1="80" x2="120" y2="420"/>
    <line x1="180" y1="80" x2="180" y2="420"/>
    <line x1="240" y1="80" x2="240" y2="420"/>
    <line x1="300" y1="80" x2="300" y2="420"/>
    <line x1="360" y1="80" x2="360" y2="420"/>
  </g>
  
  <!-- Tree / Graph nodes representing data structures -->
  <circle cx="180" cy="160" r="22" fill="#6366F1"/>
  <circle cx="320" cy="160" r="22" fill="#6366F1"/>
  <circle cx="250" cy="260" r="28" fill="#6366F1"/>
  <circle cx="160" cy="360" r="18" fill="#64748B"/>
  <circle cx="250" cy="380" r="18" fill="#64748B"/>
  <circle cx="340" cy="360" r="18" fill="#64748B"/>
  
  <!-- Connections (algorithms flow) -->
  <path d="M180 182 L230 238" stroke="#6366F1" stroke-width="6" stroke-linecap="round"/>
  <path d="M320 182 L270 238" stroke="#6366F1" stroke-width="6" stroke-linecap="round"/>
  <path d="M235 288 L180 342" stroke="#64748B" stroke-width="5" stroke-linecap="round"/>
  <path d="M265 288 L250 362" stroke="#64748B" stroke-width="5" stroke-linecap="round"/>
  <path d="M265 288 L320 342" stroke="#64748B" stroke-width="5" stroke-linecap="round"/>
  
  <!-- DSA Text -->
  <text x="250" y="455" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-2">DSA</text>
  
  <!-- Small accent dots -->
  <circle cx="140" cy="140" r="6" fill="#6366F1"/>
  <circle cx="360" cy="140" r="6" fill="#6366F1"/>
</svg>